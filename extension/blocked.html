<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Website Blocked - VeritasFlow</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0a051b 0%, #0c0822 50%, #03010b 100%);
      --primary: #8a2be2;
      --primary-hover: #9b42eb;
      --danger: #ff4757;
      --text-main: #ffffff;
      --text-sub: #a5a1b8;
      --card-bg: rgba(255, 255, 255, 0.02);
      --card-border: rgba(255, 255, 255, 0.08);
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }
    
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background: var(--bg-gradient);
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-main);
      overflow: hidden;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: 28px;
      padding: 48px 40px;
      width: 420px;
      text-align: center;
      box-shadow: var(--shadow);
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .icon-wrapper {
      width: 84px;
      height: 84px;
      background: rgba(255, 71, 87, 0.08);
      border: 2px solid var(--danger);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 28px auto;
      box-shadow: 0 0 30px rgba(255, 71, 87, 0.15);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.4);
      }
      70% {
        box-shadow: 0 0 0 15px rgba(255, 71, 87, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(255, 71, 87, 0);
      }
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      margin: 0 0 14px 0;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ff4757 0%, #ff6b81 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.message {
      font-size: 15px;
      color: var(--text-sub);
      line-height: 1.6;
      margin: 0 0 36px 0;
      font-weight: 400;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #8a2be2 0%, #6f1ab8 100%);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      box-sizing: border-box;
      margin-bottom: 14px;
      box-shadow: 0 4px 15px rgba(138, 43, 226, 0.3);
    }

    .btn:hover {
      background: linear-gradient(135deg, #9b42eb 0%, #7e24cf 100%);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(138, 43, 226, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--card-border);
      color: var(--text-sub);
      box-shadow: none;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-main);
      box-shadow: none;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrapper">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
    </div>
    <h1>Website Blocked</h1>
    <p class="message">
      This website has been blocked by <strong>VeritasFlow</strong>. Focus Mode is currently active to protect your attention and keep you on track.
    </p>
    <a href="http://localhost:5173/dashboard" class="btn">Go to Dashboard</a>
    <button class="btn btn-secondary" onclick="window.history.back()">Go Back</button>
  </div>
</body>
</html>
