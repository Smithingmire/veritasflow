<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header>
      <div class="header-left">
        <div class="logo-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#00f0ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
          </svg>
        </div>
        <div class="title-area">
          <h1>VeritasFlow</h1>
          <p>AI Information Diet</p>
        </div>
      </div>
      <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 2px;">
        <span id="user-display" style="font-size: 11px; color: var(--accent-purple); font-weight: 600; display: none;"></span>
        <a id="lnk-logout" class="logout-link" style="display: none;">Logout</a>
      </div>
    </header>

    <!-- App Content Wrapper -->
    <div id="content-wrapper">

      <!-- State: Login Required -->
      <div id="state-login" class="state-container">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        <p class="status-text" style="font-weight: 500; color: var(--text-primary);">Registration Required</p>
        <p class="status-text" style="font-size: 11px; margin-top: -6px;">We have redirected you to our website to register. Once registered, log in below using your credentials.</p>
        
        <div id="login-error" class="error-banner" style="display: none;"></div>

        <div class="form-group">
          <label>Username</label>
          <input type="text" id="txt-username" placeholder="Enter username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="txt-password" placeholder="••••••••">
        </div>
        
        <button class="btn" id="btn-login" style="margin-bottom: 8px;">Sign In</button>
        <a id="lnk-register" style="font-size: 11px; color: var(--primary); text-decoration: underline; cursor: pointer; text-align: center; display: block;">Open Registration Page</a>
      </div>
      
      <!-- State: Main Dashboard -->
      <div id="state-dashboard" style="display: none; flex-direction: column; gap: 10px;">
        <!-- Today's Diet Score -->
        <div class="metric-card" style="width: 100%; padding: 12px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 6px;">
          <div class="metric-label" style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;">Today's Diet Score</div>
          
          <!-- SVG Circular Progress Bar -->
          <div class="circle-container" style="position: relative; width: 90px; height: 90px; margin: 4px 0;">
            <svg width="90" height="90" viewBox="0 0 100 100" style="transform: rotate(-90deg);">
              <!-- Background circle -->
              <circle cx="50" cy="50" r="42" stroke="rgba(255,255,255,0.03)" stroke-width="8" fill="none" />
              <!-- Indicator circle -->
              <circle id="score-circle-progress" cx="50" cy="50" r="42" stroke="url(#circle-grad)" stroke-width="8" fill="none"
                      stroke-dasharray="263.89" stroke-dashoffset="263.89" stroke-linecap="round" style="transition: stroke-dashoffset 0.8s ease;" />
              <!-- Define Gradients -->
              <defs>
                <linearGradient id="circle-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#3b82f6" />
                  <stop offset="100%" stop-color="#8b5cf6" />
                </linearGradient>
              </defs>
            </svg>
            <div class="circle-text" style="position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;">
              <span id="circle-score-val" style="font-size: 26px; font-weight: 700; color: #fff; line-height: 1;">--</span>
              <span style="font-size: 9px; color: var(--text-secondary); margin-top: 1px;">/100</span>
            </div>
          </div>
          <div style="font-size: 11px; color: var(--text-secondary);" id="diet-score-label">Calculating...</div>
        </div>

        <!-- Top Visited Websites Section -->
        <div id="section-recent">
          <div class="section-title">Today's Top Domains</div>
          <div id="top-visited-list" style="display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px;">
            <!-- Dynamic list items will be injected here -->
          </div>
          <button class="btn" id="btn-more-info" style="margin-top: 14px;">For More Details Visit Our Website</button>
        </div>
      </div>

    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
